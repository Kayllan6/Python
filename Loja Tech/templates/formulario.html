<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>
        {% if produto %}
            Editar Produto
        {% else %}
            Cadastrar Produto
        {% endif %}
    </title> <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <body style="
    background-image: url('https://i.ytimg.com/vi/N_fNNf8lt-M/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLBXnnEAn6Ub6aY3lePBuXL9RN6mdA');
    width: 98%;
    height: 98vh;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 100%;
   
">
<label style="
color: white;
align-items: center;

">
<h1>
    {% if produto %}
        Editar Produto
    {% else %}
        Cadastrar Produto
    {% endif %}
</h1>

{% if erro %}
<p style="color:red">{{ erro }}</p>
{% endif %}

<form method="POST"
      action="{% if produto %}
                {{ url_for('editar', produto_id=produto.id) }}
              {% else %}
                {{ url_for('cadastrar') }}
              {% endif %}">

    <label>Nome:</label>
    <input type="text"
           name="nome"
           value="{{ produto.nome if produto else '' }}">
    <br><br>

    <label>Categoria:</label>
    <input type="text"
           name="categoria"
           value="{{ produto.categoria if produto else '' }}">
    <br><br>

    <label>Preço:</label>
    <input type="number"
           step="0.01"
           name="preco"
           value="{{ produto.preco if produto else '' }}">
    <br><br>

    <label>Estoque:</label>
    <input type="number"
           name="estoque"
           value="{{ produto.estoque if produto else 0 }}">
    <br><br>

    <button type="submit">Salvar</button>
</form>

<br>

<a href="{{ url_for('listar') }}">Voltar</a>

</body>
</html>
